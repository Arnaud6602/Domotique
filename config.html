<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Configuration – MaisonConnecté</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
    background:#000;
    color:#fff;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:15px;
    background:#000;
    border-bottom:2px solid #00ff88;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:white;
}

.burger{
    position:absolute;
    left:15px;
    font-size:28px;
    cursor:pointer;
    color:white;
}

/* MENU */
.menu{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100%;
    background:#02060c;
    padding:25px;
    transition:0.3s;
    z-index:1000;
}

.menu a{
    display:block;
    padding:15px 0;
    color:#00ff88;
    text-decoration:none;
    font-size:18px;
    border-bottom:1px solid #00ff8822;
}

/* CONTENU */
.container{
    max-width:1000px;
    margin:auto;
    padding:30px 20px;
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#00ff88;
}

.section{
    background:rgba(0,255,136,0.05);
    border:1px solid rgba(0,255,136,0.25);
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
}

.section h3{
    margin-bottom:15px;
    color:#00ff88;
}

label{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

input[type=number]{
    width:70px;
    padding:6px;
    border-radius:6px;
    border:none;
    text-align:center;
}

select{
    width:100%;
    padding:8px;
    border-radius:6px;
}

/* TOTAL */
.total{
    text-align:center;
    font-size:2em;
    margin-top:25px;
    color:#00ff88;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#00ff88;
    border-top:2px solid #00ff88;
    margin-top:40px;
}
</style>
</head>

<body>

<header class="header">
    <div class="burger" onclick="toggleMenu()">☰</div>
    <div class="logo">🏠 MaisonConnecté</div>
</header>

<nav id="menu" class="menu">
    <a href="index.html">Accueil</a>
    <a href="domotique.html">Domotique</a>
    <a href="securite.html">Sécurité</a>
    <a href="config.html">Configuration</a>
</nav>

<div class="container">

<h2>⚙️ Configurez votre installation</h2>

<div class="section">
<h3>🪟 Modules volets</h3>
<label>Nombre de modules
<input type="number" id="volets" min="0" value="0" onchange="calcul()">
</label>
<small>Prix dégressif automatique</small>
</div>

<div class="section">
<h3>🔐 Sécurité</h3>
<label>Pack sécurité
<select id="securite" onchange="calcul()">
<option value="0">Aucun</option>
<option value="149">Pack Mini – 149€</option>
<option value="249">Pack S – 249€</option>
<option value="349">Pack M – 349€</option>
<option value="449">Pack L – 449€</option>
</select>
</label>
</div>

<div class="section">
<h3>📷 Caméras</h3>
<label>Nombre de caméras
<input type="number" id="cameras" min="0" value="0" onchange="calcul()">
</label>
</div>

<div class="section">
<h3>📱 Option tablette murale</h3>
<label>Ajouter une tablette (+129€)
<select id="tablette" onchange="calcul()">
<option value="0">Non</option>
<option value="129">Oui</option>
</select>
</label>
</div>

<div class="total">
Total : <span id="total">0</span> €
</div>

</div>

<footer>
&copy; 2026 🏠 MaisonConnecté
</footer>

<script>
function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.left = (menu.style.left === "0px") ? "-260px" : "0px";
}

function prixVolets(qte){
    if(qte <= 1) return 89;
    if(qte <= 3) return qte * 79;
    if(qte <= 6) return qte * 69;
    return qte * 59;
}

function calcul(){
    let volets = parseInt(document.getElementById("volets").value) || 0;
    let securite = parseInt(document.getElementById("securite").value) || 0;
    let cameras = parseInt(document.getElementById("cameras").value) || 0;
    let tablette = parseInt(document.getElementById("tablette").value) || 0;

    let total = prixVolets(volets) + securite + (cameras * 129) + tablette;

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
