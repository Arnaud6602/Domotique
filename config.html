<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ MaisonConnecté - Configuration</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 0;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #00ff9c;
  font-size:18px;
}

header a{
  color:#00ff9c;
  text-decoration:none;
  margin: 0 12px;
  font-weight:bold;
}

header a:hover{
  color:#fff;
}

.container{
  max-width: 900px;
  margin:auto;
  padding: 20px;
}

h2{
  text-align:center;
  color:#00ff9c;
  margin-bottom:20px;
}

.section{
  background:rgba(0,255,150,0.05);
  border:1px solid rgba(0,255,150,0.2);
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
}

.section h3{
  color:#00ff9c;
  margin-bottom:10px;
}

label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

select, input[type=number]{
  padding:7px;
  border-radius:6px;
  border:none;
  font-size:16px;
  color:#000;
}

.total{
  text-align:center;
  font-size:24px;
  margin-top:25px;
  color:#00ff9c;
}

footer{
  text-align:center;
  padding:15px;
  border-top:1px solid #00ff9c;
  margin-top:30px;
  font-size:14px;
  color:#00ff9c;
}
</style>
</head>
<body>

<header>
  <a href="index.html">Accueil</a> |
  <a href="domotique.html">Domotique</a> |
  <a href="securite.html">Sécurité</a> |
  <a href="config.html">Configuration</a>
</header>

<div class="container">

  <h2>⚙️ Configuration personnalisée</h2>

  <div class="section">
    <h3>🪟 Modules volets</h3>
    <label>
      Nombre de modules
      <input type="number" id="volets" min="0" value="0" onchange="calcul()">
    </label>
    <small>Prix dégressif appliqué automatiquement</small>
  </div>

  <div class="section">
    <h3>🔐 Sécurité</h3>
    <label>
      Pack sécurité
      <select id="securite" onchange="calcul()">
        <option value="0">Aucun</option>
        <option value="149">Pack Mini – 149€</option>
        <option value="249">Pack S – 249€</option>
        <option value="349">Pack M – 349€</option>
        <option value="449">Pack L – 449€</option>
      </select>
    </label>
  </div>

  <div class="section">
    <h3>📷 Caméras</h3>
    <label>
      Nombre de caméras
      <input type="number" id="cameras" min="0" value="0" onchange="calcul()">
    </label>
  </div>

  <div class="section">
    <h3>📱 Option tablette murale</h3>
    <label>
      Ajouter tablette (+129€)
      <select id="tablette" onchange="calcul()">
        <option value="0">Non</option>
        <option value="129">Oui</option>
      </select>
    </label>
  </div>

  <div class="total">
    Total : <span id="total">0</span> €
  </div>

</div>

<footer>
© 2026 🏠 MaisonConnecté
</footer>

<script>
function prixVolets(q){
    if(q <= 1) return q * 89;
    if(q <= 3) return q * 79;
    if(q <= 6) return q * 69;
    return q * 59;
}

function calcul(){
    let v = parseInt(document.getElementById("volets").value) || 0;
    let s = parseInt(document.getElementById("securite").value) || 0;
    let c = parseInt(document.getElementById("cameras").value) || 0;
    let t = parseInt(document.getElementById("tablette").value) || 0;

    let total = prixVolets(v) + s + (c * 79) + t;

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
