<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration – Devis Domotique & Sécurité</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0e1a14;
    color: white;
    margin: 0;
}

header {
    background: #000;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

main {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

section {
    background: #12261c;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
}

h2 {
    margin-top: 0;
    color: #00ff9c;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

input {
    width: 70px;
    padding: 5px;
}

.total {
    background: black;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border: 2px solid #00ff9c;
}
</style>
</head>

<body>

<header>Configuration & Devis instantané</header>

<main>

<section>
<h2>Domotique – Volets roulants</h2>

<div class="row">
<label>Nombre de modules volet :</label>
<input type="number" id="volets" min="0" value="0" oninput="calcul()">
</div>

<p>Prix unitaire dégressif appliqué automatiquement.</p>
</section>

<section>
<h2>Sécurité – Alarme & Caméras</h2>

<div class="row">
<label>Pack mini sécurité (149€) :</label>
<input type="number" id="packSecu" min="0" value="0" oninput="calcul()">
</div>

<div class="row">
<label>Caméras (79€ / unité) :</label>
<input type="number" id="cameras" min="0" value="0" oninput="calcul()">
</div>

<div class="row">
<label>Sirènes (39€) :</label>
<input type="number" id="sirene" min="0" value="0" oninput="calcul()">
</div>

<div class="row">
<label>Détecteurs ouverture (29€) :</label>
<input type="number" id="ouverture" min="0" value="0" oninput="calcul()">
</div>

<div class="row">
<label>Détecteurs mouvement (39€) :</label>
<input type="number" id="mouvement" min="0" value="0" oninput="calcul()">
</div>

</section>

<section>
<h2>Options</h2>

<div class="row">
<label>Tablette murale (129€) :</label>
<input type="number" id="tablette" min="0" value="0" oninput="calcul()">
</div>

</section>

<div class="total">
Total : <span id="total">0</span> €
</div>

</main>

<script>
function prixVolets(n) {
    if (n <= 0) return 0;
    if (n == 1) return 89;
    if (n == 2) return 170;
    if (n == 3) return 249;
    if (n == 4) return 320;
    if (n == 5) return 390;
    return 390 + (n - 5) * 78;
}

function calcul() {
    let volets = parseInt(document.getElementById("volets").value) || 0;
    let packSecu = parseInt(document.getElementById("packSecu").value) || 0;
    let cameras = parseInt(document.getElementById("cameras").value) || 0;
    let sirene = parseInt(document.getElementById("sirene").value) || 0;
    let ouverture = parseInt(document.getElementById("ouverture").value) || 0;
    let mouvement = parseInt(document.getElementById("mouvement").value) || 0;
    let tablette = parseInt(document.getElementById("tablette").value) || 0;

    let total =
        prixVolets(volets) +
        packSecu * 149 +
        cameras * 79 +
        sirene * 39 +
        ouverture * 29 +
        mouvement * 39 +
        tablette * 129;

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
